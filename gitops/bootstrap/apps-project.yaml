apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: linkpulse application workloads
  sourceRepos:
    - https://github.com/maorbrantz/prj01-eks-gitops-platform
    - https://github.com/maorbrantz/prj01-linkpulse-app
  destinations:
    - server: https://kubernetes.default.svc
      namespace: linkpulse-dev
  # the only cluster scoped object the app creates is its own namespace, via the
  # CreateNamespace sync option. everything else is namespaced.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
