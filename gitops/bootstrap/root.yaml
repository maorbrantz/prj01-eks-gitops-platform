apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  # app of apps: this source holds one Application manifest per addon under
  # gitops/platform. recursing the tree picks each of them up automatically as
  # later phases add folders.
  source:
    repoURL: https://github.com/maorbrantz/prj01-eks-gitops-platform
    targetRevision: main
    path: gitops/platform
    directory:
      recurse: true
      include: "{**/application.yaml,**/project.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
