apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: linkpulse-platform-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: linkpulse.api
      rules:
        - alert: LinkpulseApiHighErrorRate
          # 5xx share of api requests over 2 percent for five minutes.
          expr: |
            sum(rate(http_requests_total{namespace="linkpulse-dev",status=~"5.."}[5m]))
              /
            sum(rate(http_requests_total{namespace="linkpulse-dev"}[5m]))
              > 0.02
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "linkpulse api 5xx ratio above 2 percent"
            description: "The api is returning more than 2 percent 5xx responses over the last 5 minutes."
        - alert: LinkpulseApiHighLatency
          # p95 request latency above 500ms for ten minutes.
          expr: |
            histogram_quantile(
              0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="linkpulse-dev"}[5m])) by (le)
            ) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "linkpulse api p95 latency above 500ms"
            description: "The api p95 request latency has stayed above 500ms for 10 minutes."
    - name: linkpulse.worker
      rules:
        - alert: LinkpulseWorkerStalled
          # the worker is polling batches (queue has work) but processing nothing.
          # approximates a stuck consumer without a direct queue depth metric.
          expr: |
            rate(worker_batches_polled_total{namespace="linkpulse-dev"}[10m]) > 0
              and
            rate(worker_messages_processed_total{namespace="linkpulse-dev"}[10m]) == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "linkpulse worker consuming but not processing"
            description: "The worker is polling SQS batches but has processed no messages for 10 minutes."
    - name: kubernetes.workloads
      rules:
        - alert: PodCrashLooping
          expr: |
            max by (namespace, pod, container) (
              rate(kube_pod_container_status_restarts_total[5m]) * 60
            ) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} has restarted more than once per minute for 10 minutes."
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been NotReady for 5 minutes."
