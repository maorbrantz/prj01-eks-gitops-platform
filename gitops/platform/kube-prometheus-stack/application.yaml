apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # the chart ships very large CRDs (prometheuses, alertmanagers, rules). server
    # side apply avoids the client side annotation size limit, and server side
    # diff keeps the api-defaulted CRD fields from showing as permanent drift.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.10.1
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/gitops/platform/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/maorbrantz/prj01-eks-gitops-platform
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # the grafana chart renders a fresh random admin password into its Secret on
  # every manifest generation, and the grafana Deployment carries a checksum of
  # that Secret. left alone these flap OutOfSync forever. ignoring the generated
  # fields keeps the first applied password stable and the app Synced. retrieve
  # the password with the command in values.yaml.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: kube-prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      name: kube-prometheus-stack-grafana
      namespace: monitoring
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
