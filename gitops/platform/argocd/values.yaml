# argo-cd helm values for the prj01-dev cluster.
# Sized for a small two node t3.medium system group: no HA, small requests,
# server runs insecure behind a port-forward until ingress lands in a later phase.

global:
  # keep every argocd pod on the system node group and off future spot workers
  nodeSelector:
    kubernetes.io/os: linux

configs:
  params:
    # terminate TLS at the ingress later; for now serve plaintext behind port-forward
    server.insecure: true

  cm:
    # short reconcile so gitops changes show up quickly during demos
    timeout.reconciliation: 90s

controller:
  replicas: 1
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    # the controller was OOMKilled at 512Mi and again at 1Gi once the platform
    # addons landed: cert-manager, kyverno and the alb controller ship large
    # CRDs, and reconciling all of them at once peaks well past a gigabyte.
    # 1.5Gi holds on the two node t3.medium system group with room to spare.
    limits:
      memory: 1536Mi

repoServer:
  replicas: 1
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

server:
  replicas: 1
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

applicationSet:
  replicas: 1
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

redis:
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

# dex and notifications are not needed yet, drop them to save capacity
dex:
  enabled: false

notifications:
  enabled: false
