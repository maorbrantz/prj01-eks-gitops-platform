apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require resource requests and limits
    policies.kyverno.io/description: >-
      Every container must set cpu and memory requests and a memory limit so the
      scheduler can place it and the node is protected from noisy neighbours.
spec:
  background: true
  rules:
    - name: require-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - default
                - linkpulse-*
      validate:
        failureAction: Enforce
        message: >-
          cpu and memory requests and a memory limit are required on every
          container
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    memory: "?*"
