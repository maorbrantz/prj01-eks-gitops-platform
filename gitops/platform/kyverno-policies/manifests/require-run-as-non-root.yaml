apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/description: >-
      Pods must declare runAsNonRoot at the pod or container level so containers
      cannot run as uid 0.
spec:
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - default
                - linkpulse-*
      validate:
        failureAction: Enforce
        message: >-
          runAsNonRoot must be true on the pod securityContext or on every
          container securityContext
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
