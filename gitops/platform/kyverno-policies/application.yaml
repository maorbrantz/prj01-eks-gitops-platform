apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  # plain manifests, not a chart. keep them in a manifests subfolder so the app
  # of apps include filter does not also treat them as Applications.
  source:
    repoURL: https://github.com/maorbrantz/prj01-eks-gitops-platform
    targetRevision: main
    path: gitops/platform/kyverno-policies/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
