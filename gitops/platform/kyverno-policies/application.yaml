apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  # plain manifests, not a chart. keep them in a manifests subfolder so the app
  # of apps include filter does not also treat them as Applications.
  source:
    repoURL: https://github.com/maorbrantz/prj01-eks-gitops-platform
    targetRevision: main
    path: gitops/platform/kyverno-policies/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  # kyverno mutates each policy on admission, filling in defaults the manifests
  # do not set (admission, background, emitWarning, and a spec level
  # validationFailureAction copied up from the rules for backward compatibility).
  # Ignoring those fields keeps the policies from showing permanently OutOfSync.
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      jsonPointers:
        - /spec/admission
        - /spec/background
        - /spec/emitWarning
        - /spec/validationFailureAction
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
