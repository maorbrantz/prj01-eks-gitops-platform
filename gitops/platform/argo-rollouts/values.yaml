# argo-rollouts controller for prj01-dev.
# Canary progressive delivery for the linkpulse api. This phase uses pause based
# steps only. Prometheus driven AnalysisTemplates arrive with the observability
# stack in the next phase.

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

# The dashboard and its service are extra surface we do not need. rollout status
# is read with kubectl and the argocd ui already renders the rollout resource.
dashboard:
  enabled: false

notifications:
  enabled: false
